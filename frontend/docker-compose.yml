version: "3.9"

# Production-mode compose for footy-ev frontend module.
# Both services read from the same .env file at frontend/.env.
# The warehouse DuckDB is mounted read-only into the API container.
#
# Usage:
#   cd frontend
#   docker-compose up --build
#
# The Next.js frontend is available on http://localhost:3000.
# The FastAPI backend is internal-only (not mapped to host).

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - UI_OPERATOR_TOKEN=${UI_OPERATOR_TOKEN}
      - UI_API_BIND_HOST=0.0.0.0
      - UI_API_PORT=8000
      - WAREHOUSE_PATH=${WAREHOUSE_PATH:-/data/footy_ev.duckdb}
      - KALSHI_API_KEY_ID=${KALSHI_API_KEY_ID:-}
      - KALSHI_PRIVATE_KEY_PATH=${KALSHI_PRIVATE_KEY_PATH:-}
      - KALSHI_API_BASE_URL=${KALSHI_API_BASE_URL:-https://demo-api.kalshi.co/trade-api/v2}
      - KALSHI_COMMISSION_PCT=${KALSHI_COMMISSION_PCT:-0.07}
    volumes:
      - ../data:/data:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://api:8000
    ports:
      - "3000:3000"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
